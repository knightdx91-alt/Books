project:
  title: "Horror Story (provisional title)"
  genre: "Horror"
  subgenre: "Supernatural / ghost-hunting horror"
  language: "English"
  word_count_target: 80000
  comp_titles: ["The Hollow Places (T. Kingfisher)", "A Head Full of Ghosts (Paul Tremblay)", "The Sun Down Motel (Simone St. James)"]
  engagement_type: {primary: "fascination", secondary: "empathy", tertiary: "dread"}
  premise: "A widowed bed-and-breakfast owner who has always seen ghosts goes hunting when a wraith that feeds on the living and the dead alike devours his late wife's lingering spirit."
  created: "2026-07-13"
  updated: "2026-07-13"

# ADAPTED RUN — revise/expand an existing draft, NOT genesis-from-idea.
adaptation:
  mode: "revise-existing-draft"
  canon_sources:
    # Fill these in once source material is staged into research/:
    original_draft:  "research/source-notes.md"   # raw prose to revise/expand
    # series_roadmap:  "research/series-roadmap.md"
    # character_bible: "research/character-bible.md"
    # chapter_roadmap: "research/chapter-roadmap.md"   # scene-by-scene plan (binding outline)
    # master_checklist:"research/master-checklist.md"
  chapter_1_locked: false        # set true if Ch.1 is a hand-finished voice benchmark
  chapters_to_produce: []        # e.g. [2,3,...,N]

word_floor:
  manuscript_min_words: 85000    # HARD FLOOR (book total) — the binding gate; adjust per book.
  manuscript_target_words: 90000 # architect budgets Σ chapter targets ≥ this (see book-architect §0.5).
  # NOTE: there is deliberately NO uniform per-chapter floor. Chapter lengths VARY WIDELY
  # (~1,500–7,000w) by design — the book TOTAL is what's enforced, not each chapter. A
  # per-chapter minimum would recreate the uniform ~5k/20-chapter "AI-neat" shape.
  shortest_chapter_floor: 1200   # sanity floor for the SHORTEST allowed chapter (punch chapters ok; not a target)

phase:
  current: 1
  status: "SPINE DEVELOPED & LOCKED (2026-07-13) — research/source-notes.md now holds the full developed story spine (canon): drive = STOP it not rescue (letting-go arc); antagonist = 'the Starved Dead' (a ghost that refused to move on and learned to eat souls — a dark mirror of John); it's REAL (no unreliable-narrator); partner = a ghost-hunter who SENSES but can't SEE (platonic found-family, no romance); origin = LOCAL (the house is the lair; investigation = weapon); STANDALONE. Fused climax (temptation/permission/letting-go/cost as one beat); the wife's death stays NATURAL, not the wraith. READY for architect pass. Prose not yet drafted. Still open (architect to propose): title, the Starved Dead's specific identity/local history, John's gift rules & limits, the partner's name/backstory, escalation beat-map, setting specifics."
  history: []

chapters:
  total_planned: 0
  completed: []
  scores: {}

genesis_score:
  current_floor: 0.0
  current_average: 0.0

quality_gate:
  chapters_passed: []
  chapters_escalated: []

guardrails:
  - "Genesis Floor >= 8.5 per chapter (book-evaluator); polish-loop via book-editor (max 5)."
  - "Style gate: python3 tools/style_check.py must stay clean (simile <=4/1k, em-dash <=~10/1k, no NEW cross-chapter repeated phrase, tics under ceiling). Add this book's deliberate motifs to ALLOWLIST in tools/style_check.py."
  - "Word floor >= manuscript_min_words; verify with: wc -w manuscript/chapters/chapter-*.md."
  - "Revise/expand the original draft to the roadmap; do NOT invent from scratch. Match the locked Ch.1 voice if one exists."
  - "MC John Maxwell, a lifelong medium who runs a B&B; his late wife's ghost (a skeptic in life) is taken by an unknown entity draining both living and dead. He has laid ghosts to rest before but never faced this."

open_author_decisions:
  - "Name the antagonist entity and its rules (what it is, how it feeds, how it can be stopped)."
  - "Decide the real title (folder is provisional)."

decisions:
  - "This book is a folder-per-book genesis project under book/genesis/<slug>/."
revision_cycles: 0
