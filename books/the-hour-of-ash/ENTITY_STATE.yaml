# ============================================================================
# ENTITY_STATE.yaml  —  "The Hour of Ash" (working title "Pompeii")
# Structured entity memory. Built by entity-tracker (BUILD mode) from Ch.1-7.
# Downstream skills (continuity-guardian, prose-craft, hook-craft, etc.) read
# THIS instead of re-reading the manuscript. entity-tracker EXTRACTS and FLAGS;
# it does not audit, resolve, or judge.
# ----------------------------------------------------------------------------
# NOTE ON SOURCES: paragraph numbers (pNN) are approximate counts of prose
# paragraphs within each chapter file (blank-line separated, excluding the HTML
# comment header and the "---" scene-break rules). Treat as locators, not exact.
# ============================================================================
#
# ============================ FLAGS FOR CONTINUITY ==========================
# (contradictions / ambiguities noticed during extraction — NOT fixed, only surfaced)
#
# FLAG 1 — ORACLE TIMING (Ch.7). Ch-7 states, retrospectively, that "The Oracle
#   had told me, in the first hour, in words I had turned over ten thousand times
#   since, that the door home lay under a mountain by the Roman sea" (ch-07:p67).
#   BUT within the same chapter Mara has NOT yet visited the Pythia — she is still
#   PLANNING to climb the sacred way to ask WHERE the door is ("she told me where
#   the door is not. She might tell me where it is", ch-07:p69), and the outline
#   places the Oracle scene at Ch.10. So Ch.7 simultaneously (a) claims the Oracle
#   already told her the WHERE ("under a mountain by the Roman sea") in "the first
#   hour", and (b) has her not-yet-consulted the Oracle and planning to. The
#   "first hour" she landed (Ch.4-5) contained no Oracle meeting on the page.
#   Possible intended reading: retrospective foreknowledge intrusion collapsing a
#   later event; but as written it reads as Mara already possessing the WHERE
#   before the Ch.10 Oracle beat. RESOLVE before Ch.10 is written.
#
# FLAG 2 — "under a mountain by the Roman sea" vs canon "Pompeii/Vesuvius". The
#   on-page WHERE (ch-07:p67) is the vague "mountain by the Roman sea", consistent
#   with canon that the Oracle gives WHERE-not-WHEN and Mara narrows it later. No
#   contradiction; noted so continuity knows the specific "Pompeii" name has NOT
#   yet been given to Mara on the page as of Ch.7.
#
# FLAG 3 — FENN'S ATTEMPT COUNT. Ch-1 note: "This is the eleventh attempt"
#   (ch-01:p30) and "Went through the fourth of the month". Ch-2 ledger shows a
#   dated column of attempts across three years with the successful crossing on
#   "4th of the month" (ch-02:p94). Counts are compatible but not reconciled on
#   the page (11 attempts vs a 3-year dated column). Low priority.
#
# FLAG 4 — MARA'S NAME ON THE PAGE. Mara gives Kallia "the nearest true thing my
#   mouth could make of my name" and lets a "Greek shape" of it stand (ch-05:p57);
#   Kallia later calls her "Mara" directly (ch-07:p63, "Angry, Mara. Not detailed").
#   So the narrator's real first name IS used aloud in-world by Ch.7, though Ch.5
#   implied a Greek-ified version was adopted. Verify intended in-world name.
#
# FLAG 5 — VALENS FIRST-LOOK CONSISTENCY. Ch-5 establishes he "never looked at my
#   face" (ch-05:p105-109). Ch-7, their first two-hander, has him deliberately
#   NOT looking up, then pointedly looking "at my face" for the first time
#   (ch-07:p121-123). Intentional callback/payoff, not a contradiction — logged
#   so it is not mistaken for one.
#
# FLAG 6 — "the one it brought" branded door-law phrase (canon/allowlist) does
#   NOT yet appear on the page in Ch.1-7. Fenn's #3 insert ("only open for the one
#   they brought", outline Ch.10) is still ahead. Tracked as world_rules gap.
# ============================================================================

