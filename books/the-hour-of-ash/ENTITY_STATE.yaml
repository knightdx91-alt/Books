        current_status: "ch-08: asked after 'a fighting man from the south, went by a fighting name'; framed it as 'an old debt, a household I served'; Valens denied him ('I'd not know him'); man arranged passage for 'day after tomorrow' then rode back UP the valley the WRONG way (not toward Kirrha as he'd claimed)"
    location_log:
      - { chapter: 8, location: "Valens's mule-yard (came on the ninth day, afternoon)", scene: "posed as a hirer wanting passage to Kirrha/Corinth; asked after the fighting man; rode back up-valley the wrong way", travel_noted: true }
    knowledge:
      - { fact: "confirmed a big scarred Roman fighting-man came up from the south a few years back and can be found near Delphi (Valens denied being him, but the agent 'didn't suppose' otherwise)", learned: "ch-08:p187", method: "discovered (asking down the valley)" }
    arc_notes: "New Ch.8 character — the legate's reach seeded PHYSICALLY on the page (the faction's pursuit is now active, not just rumour). Valens: 'He'll not be the last.' The wrong-direction departure marks him as not a real hirer."
