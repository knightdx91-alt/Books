locations:

  emilio-house:
    canonical_name: "Emilio Reyes's house (the father's house)"
    aliases: ["the study", "the drawer's house"]
    facts:
      - { fact: "English; cold spring 1998; study three walls double-shelved; a bread bin with a stale sliced loaf", source: "ch-01:p31" }
      - { fact: "the bottom-left desk drawer will not open (holds the folded glasses) — never opened", source: "ch-01:p13" }
      - { fact: "the map/tube hidden behind the second (hidden) row of books", source: "ch-01:p55" }
    distances:
      - { to: "verrall-shop", value: "3 hours up the coast", source: "ch-02:p16" }

  verrall-shop:
    canonical_name: "Verrall & Son"
    aliases: ["the antique shop"]
    facts:
      - { fact: "in the fourth of three-same coastal towns, a side street off the water, between a shut cafe and a chapel-turned-carpet-showroom", source: "ch-02:p18" }
      - { fact: "back room: paraffin heater, kettle, tea-chests; the Fenn ledger kept here", source: "ch-02:p61" }
      - { fact: "window barometer fixed on 'Change' (Fenn's unpaid-for barometer motif)", source: "ch-02:p20" }

  the-headland:
    canonical_name: "the headland / the saddle (threshold)"
    aliases: ["the lid of the world", "the saddle of rock"]
    facts:
      - { fact: "a fist of pale rock past the last olives on a southern (Greek) coast; a shallow greener saddle ~10ft across, thyme in the cracks", source: "ch-03:p35" }
      - { fact: "instruments read wrong here: meters pegged, watch drags/accelerates, compass rotates pointing at 'a north under the world'", source: "ch-03:p69" }
      - { fact: "the crossing point; a downward-inward 'pull'; the way back closes on crossing", source: "ch-04:p13" }
    distances:
      - { to: "crossroads-taverna", value: "~40 minutes down the road", source: "ch-03:p27" }

  crossroads-taverna:
    canonical_name: "the crossroads taverna"
    aliases: []
    facts:
      - { fact: "a taverna at a crossroads ~40 min from the headland; two old men under a vine; extraordinary wood-fired bread", source: "ch-03:p27" }

  delphi-sanctuary:
    canonical_name: "Delphi (the sanctuary of Apollo)"
    aliases: ["the sacred plain", "the god's ground"]
    facts:
      - { fact: "terraced sanctuary climbing a grey peak above an olive plain above a gulf; polygonal masonry retaining wall; treasuries lining the sacred way", source: "ch-05:p21" }
      - { fact: "statue plinths freshly stripped of ~500 bronzes (Nero's looting, dated to AD 67) — dates the arrival post-67, under Vespasian (~AD 70)", source: "ch-05:p29" }
      - { fact: "temple of Apollo on the polygonal terrace, six columns wide; altar smoke; the Pythia still speaks (genteel decline)", source: "ch-05:p54" }
      - { fact: "Castalian spring / fountain-house below the sanctuary where the road widens", source: "ch-05:p93" }

  kallias-inn:
    canonical_name: "Kallia's house / inn"
    aliases: ["the byre", "the house below the road"]
    facts:
      - { fact: "a single low room of grey polygonal stone below the road; hearth, byre for the goat, loft, beaten-earth floor; a lamp-niche by the door", source: "ch-05:p121" }
      - { fact: "a small poor inn letting two rooms to the sacred-road traffic; a third best room kept shut for the absent son", source: "ch-06:p105" }
      - { fact: "on the sanctuary road; ~3 miles up from Valens's yard", source: "ch-07:p99" }

  olive-village:
    canonical_name: "the Delphi valley / olive groves"
    aliases: ["the sacred plain of olives", "the terraces"]
    facts:
      - { fact: "silver-green olive forest filling the valley to the sea; communal autumn harvest; a great stone press below the grove", source: "ch-06:p83" }

  valens-yard:
    canonical_name: "Valens's mule-yard"
    aliases: ["the Roman's yard"]
    facts:
      - { fact: "where the sanctuary road bends south, a fold of ground with a stream and a stand of poplars; low house, longer stable, mud paddock", source: "ch-07:p101" }
      - { fact: "~a dozen mules and three horses; harness oiled and graded, mending-bench, muck-heap squared off — a careful man's yard", source: "ch-07:p101" }
    distances:
      - { to: "kallias-inn", value: "3 miles up the sanctuary road", source: "ch-07:p99" }
      - { to: "kirrha", value: "Valens's road runs down to the coast near a ship (Kirrha or thereabouts)", source: "ch-07:p116" }

  kirrha:
    canonical_name: "Kirrha"
    aliases: []
    facts:
      - { fact: "a coastal/port destination south of Delphi where the wool/oil roads end near a ship", source: "ch-07:p13" }
      - { fact: "'the poppies below Kirrha' — where the Krisa widow's body was found", source: "ch-07:p159" }

  krisa:
    canonical_name: "Krisa"
    aliases: []
    facts:
      - { fact: "a settlement on the road down; the murdered widow's party set out from here; Valens carried her body up to Krisa", source: "ch-07:p165" }

  amphissa:
    canonical_name: "Amphissa"
    aliases: []
    facts:
      - { fact: "town of origin of the oil-jar wagoner who refused Mara passage", source: "ch-07:p13" }

  campania-pompeii:
    canonical_name: "Campania / Pompeii (the goal — 'a mountain by the Roman sea')"
    aliases: ["Italy", "the bay below the smoking mountain", "the far goal"]
    facts:
      - { fact: "Mara's destination: 'the bay below the smoking mountain' in Italy where the door home lies", source: "ch-06:p173" }
      - { fact: "the WHERE Mara carries: 'under a mountain by the Roman sea' (a hundred mountains) — not yet narrowed to a name on the page", source: "ch-07:p67", note: "see FLAG 1 & 2" }
      - { fact: "Puteoli named as a plausible destination in the widow cover-story", source: "ch-07:p63" }
      - { fact: "Emilio's Campanian-coast survey permit (via Halloran) points the cover-story here", source: "ch-01:p87" }

timeline:
  - chapter: 1
    time: "an April day (weeks after the father's death); into the following morning"
    season: "English spring (sleet then thin sun)"
    year: 1998
    note: "Modern frame. Narrator fixes the year explicitly ('It was 1998')."
  - chapter: 2
    time: "the next day — driven since first light"
    season: "spring"
    year: 1998
    note: "Verrall's timeline references: Fenn vanished autumn 1968; Emilio's three visits 'last spring, near enough a year gone'."
  - chapter: 3
    time: "one night decoding; flies out 'three days later'; arrives foreign coast; surveys the headland at ~5pm"
    season: "hot southern summer (arrival country); English spring at start"
    year: 1998
    note: "Travel montage compresses several days."
  - chapter: 4
    time: "'the fourth day' — early afternoon, tide going out; the crossing"
    season: "summer (departure); crosses into AD Greek summer"
    year: 1998
    note: "Point-of-no-return. Light 'wrong for the hour' on arrival; departs evening, lands mid-morning."
  - chapter: 5
    time: "arrival morning through the first night (crossing day)"
    season: "high hot southern summer (cicadas)"
    year: "~AD 70"
    note: "Dated on page via Nero's stripped bronzes (AD 67 looting) + Vespasian's reign; narrator states '~1928 years before' 1998. Contradicts nothing; anchors the AD ~70 frame."
  - chapter: 6
    time: "'the second morning' through a first autumn and into the black of winter (a season+)"
    season: "late autumn (olive harvest) into hard winter (Kallia's fever)"
    year: "~AD 70"
    note: "Spans several months. 'No ship crosses till the spring.'"
  - chapter: 7
    time: "'the tail of winter' into the first dry-road days of spring; the fair is 'six weeks' off"
    season: "late winter -> early spring"
    year: "~AD 70 (spring)"
    note: "Widow cover built 'over three nights'; Mara to return to the yard 'in three days'. Krisa-widow backstory dated 'two springs back'."
  - chapter: 8
    time: "~9-10 days at Valens's yard in early spring: return on day 3, Drusus arrives day 5, the consignment day 6, the legate's agent on day 9, the 'yes' that evening; ends with Mara climbing 3 miles home to Kallia's at night"
    season: "early spring"
    year: "~AD 70 (spring)"
    note: "Departure for Delphi set 'day after tomorrow, before light'. Continuous with Ch.7's 'return to the yard in three days'. Festival day at the sanctuary is coming (the trade week up top)."

objects:

  the-map:
    introduced: "ch-01:p59"
    description: "A linen-backed working survey map of a (Greek) coastline; muddled Greek/Roman scripts, offshore depths, inland excavation crosses; one cross ringed twice hard; A. Fenn's copperplate marginalia incl. 'The door'. Emilio added the ringed cross's coordinates in his own ink."
    status: chekhov_open
    last_mentioned: "ch-05:p137 (carried in the kit across the crossing)"
    resolution: null

  fenn-notes-ledger:
    introduced: "ch-01:p65"
    description: "August Fenn's papers: the mailing-tube note ('the door is not honest', 11th attempt); the cloth-bound ledger (dated left column of attempts, money right column); the flyleaf marginalia #1; journal #2 ('I, too, woke in the wrong year'). The 'only map through this any human ever drew.'"
    status: chekhov_open
    last_mentioned: "ch-05:p141"
    resolution: null
    note: "Verrall wrote out the flyleaf line ('the map is honest, it is the door that lies') on a shop receipt for Mara (ch-02:p162) — a separate carried token."

  camera-and-roll:
    introduced: "ch-01:p89"
    description: "A good manual all-metal 35mm camera with a roll of film shot months ago and never developed. At the headland Mara loads fresh film but does NOT press the shutter — one blank frame on the counter; 'the frame I did not take'."
    status: chekhov_open
    last_mentioned: "ch-05:p75 (catalogued as anachronism in the kit)"
    resolution: null
    note: "Re-read seed #4 (fieldwork kit ritual). Per outline pays off Ch.26/climax."

  fathers-wristwatch:
    introduced: "ch-01:p89"
    description: "Emilio's cheap accurate steel wristwatch, dull at the lugs, second hand that sweeps. Worn by Mara. At the headland it drags/strains then accelerates (time distortion), then keeps perfect time."
    status: chekhov_open
    last_mentioned: "ch-05:p75"
    resolution: null

  dig-slides:
    introduced: "ch-01:p35"
    description: "A carousel + three boxes of Emilio's 30 years of dig-season slides; trenches, section drawings, meter-sticks, walls; his thumb in the corner of two."
    status: background
    last_mentioned: "ch-01:p91 (left behind; not taken across)"
    resolution: null

  folded-glasses-click:
    introduced: "ch-01:p17"
    description: "Emilio's tortoiseshell reading glasses folded in the locked drawer; the *click* of the arms folding — a sound 'below language' that intrudes at the worst moments. THE motif instrument (reserved payoff Ch.36)."
    status: chekhov_open
    last_mentioned: "ch-03:p87 (intrudes at the headland)"
    resolution: null
    note: "Withheld deliberately Ch.4-7 per style policy; re-appears only where load-bearing."

  kallias-lamp:
    introduced: "ch-05:p131"
    description: "A small clay lamp Kallia fills, trims, and lights nightly in the window/niche for her absent soldier son; 'a lit lamp wastes no oil it wasn't going to waste'. Mara keeps it lit through Kallia's fever — takes up the vigil."
    status: chekhov_open
    last_mentioned: "ch-07:p223"
    resolution: null
    note: "Mirror-motif to Mara's shut drawer. Both are 'the useless faithful gesture toward the one who is not coming back'."

  the-linen-scarf:
    introduced: "ch-05:p83"
    description: "A plain undyed square of linen Mara carried against the sun — the one item of her kit that could exist in AD 70. First object of her disguise; drawn over her hair. 'One of the few things I carried all the way through.'"
    status: chekhov_open
    last_mentioned: "ch-05:p85"
    resolution: null

  compass-and-meters:
    introduced: "ch-03:p59"
    description: "A prismatic oil-damped compass and two light meters (camera CdS + a selenium handheld). All behave wrong at the saddle (pegged / rotating) then read true after. 'They told me the truth' about the crossing."
    status: background
    last_mentioned: "ch-05:p75"
    resolution: null

  field-notebook:
    introduced: "ch-01:p77"
    description: "Mara's stiff waterproof gridded field notebook with a pencil bound in the spiral. Holds Emilio's copied coordinates and the date/place/time she wrote at the headland in her own hand (re-read seed for Ch.26)."
    status: chekhov_open
    last_mentioned: "ch-05:p137"
    resolution: null

  buried-kit-cairn:
    introduced: "ch-05:p81"
    description: "Mara's modern technical jacket and anachronistic coins, buried under a cairn of stones above the sanctuary, marked against a split oak, a white boulder, and the polygonal wall — recorded like a find-spot to return to."
    status: lost
    last_mentioned: "ch-06:p75 (trousers added to the cairn)"
    resolution: { chapter: 6, paragraph: 75, description: "The impossible modern clothes committed to the cairn as Mara assimilates; a marked cache she intends to recover." }

  trade-card:
    introduced: "ch-01:p79"
    description: "An antique-dealer trade card (Verrall's, ~20 yrs old) fallen in the map-tube; Emilio wrote 'Fenn?' on the back. Leads Mara to Verrall's shop."
    status: chekhov_closed
    last_mentioned: "ch-02:p38"
    resolution: { chapter: 2, paragraph: 38, description: "The card leads Mara to Verrall & Son; its purpose (finding Fenn's source) is spent when Verrall recognises it." }

  the-boots:
    introduced: "ch-05:p85"
    description: "Mara's modern hiking boots — kept, hidden under the hem, her 'one small mutiny' when everything else is surrendered to disguise."
    status: chekhov_open
    last_mentioned: "ch-07:p105 (implied under the widow's dress)"
    resolution: null

organizations:

  legate-household:
    canonical_name: "the great man's household / the legate's faction (Valens's scandal)"
    aliases: ["a great man's household, a woman's name in it"]
    facts:
      - { fact: "the 'scandal down south' that ruined Valens and drove him to hide in the hills as a freedman", source: "ch-07:p87" }
      - { fact: "the faction's pursuit is now ACTIVE and PHYSICAL: an agent (deliberately ordinary, good Campanian-weave cloak, hired mule) came to Valens's yard on the ninth day asking after 'a fighting man from the south, went by a fighting name', framing it as 'an old debt, a household I served', then rode back UP the valley the wrong way (not toward Kirrha as claimed)", source: "ch-08:p187" }
      - { fact: "Valens's reaction: stillness; hands worked the mule's lead-rope buckle then went 'open and still'; his line 'He'll not be the last'", source: "ch-08:p201" }
    note: "Per canon the provincial legate's faction becomes antagonist-force #4 (via Sabina) in later movements. As of Ch.8 the reach is no longer just rumour — an agent has physically come asking. See character legate-agent. Possible danger-vector convergence: Drusus names his creditor loudly up and down the valley (ch-08:p203, Mara notes it) — tracked, not resolved."

  factors-wool-party:
    canonical_name: "the factor's wool party (from Corinth)"
    aliases: ["the wool party", "the factor from Corinth"]
    facts:
      - { fact: "a factor from Corinth 'who answers to real people' runs a proper guarded party with the wool down to the coast twice a year", source: "ch-07:p199" }
      - { fact: "a widow woman travels with it; short a book-keeping companion this spring — Valens brokers Mara into the role as the 'safe crossing'", source: "ch-07:p199" }
    note: "The safe road Valens finds for Mara instead of running her on his string."

  the-legions:
    canonical_name: "the Roman legions"
    aliases: []
    facts:
      - { fact: "Kallia's son enlisted six years ago (a recruiter with a full purse); last heard from two years back 'from the edge of the world'", source: "ch-06:p207" }

world_rules:
  - { rule: "The map is honest; the door is not — 'the map tells you where, and something else entirely decides when, and whether, and for whom'", source: "ch-02:p108" }
  - { rule: "The door opened for Fenn and 'would not open for the others' — it is selective ('for whom')", source: "ch-01:p65" }
  - { rule: "The crossing point behaves as an added spatial direction ('a north under the world' / a downward-inward pull); instruments read it though eyes cannot", source: "ch-03:p69" }
  - { rule: "The way back closes as you cross ('felt it close the way a held breath closes a throat')", source: "ch-04:p21" }
  - { rule: "The door answers WHERE but not WHEN (Mara carries a WHERE — 'a mountain by the Roman sea' — but not the when)", source: "ch-07:p67", note: "SEE FLAG 1 — the on-page Oracle meeting has not yet occurred; treat this rule as canon-stated but not yet dramatized." }
  - { rule: "A lone woman cannot travel — she needs a man's name to be real ('a woman is real in the light a man throws on her'); no man = runaway, whore, or unclaimed, all 'solved by force'", source: "ch-06:p189" }
  - { rule: "A widow is the least-unfree woman — she can travel on a dead husband's business with coin, a reason, and a story that holds", source: "ch-06:p249" }
  # GAP: the branded door-law phrase 'the one it brought' / 'only opens for the one it brought' is canon but NOT yet on the page as of Ch.7 (outline places Fenn insert #3 at Ch.10). See FLAG 6.
