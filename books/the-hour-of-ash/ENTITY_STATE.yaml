    voice_markers:
      ref: "voice-dna.md#kallia"
    wound: "A son who went for a soldier six years ago, unheard-from two years; keeps a lamp lit nightly in the window for him; keeps his room swept, shut, and unsold."
    relationships:
      mara-reyes:
        type: "shelters, feeds, teaches, and adopts Mara ('you are not the wrong niece')"
        established: "ch-05:p113"
        current_status: "deep mutual love, unspoken; built Mara's widow cover with her"
      kallias-son:
        type: "mother of (unnamed son in the legions)"
        established: "ch-06:p207"
        current_status: "unheard-from; lamp kept lit"
    location_log:
      - { chapter: 5, location: "her house/byre below the sanctuary road, Delphi", scene: "finds Mara on the broken ground, takes her in, feeds her, first language lesson", travel_noted: false }
      - { chapter: 6, location: "Kallia's inn (sanctuary road)", scene: "teaches Mara to pass; olive harvest; the fever she survives; tells of the lamp/son; 'the size of your mountain'", travel_noted: false }
      - { chapter: 7, location: "Kallia's inn", scene: "builds the widow cover over three nights ('take out the wall'); names Valens; warns of 'the dangerous no'", travel_noted: false }
    knowledge:
