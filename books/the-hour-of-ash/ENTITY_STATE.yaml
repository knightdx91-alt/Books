    physical:
      description: { value: "deliberately ordinary, 'refuses to be more than ordinary'; middle years; a good road-dusted traveller's cloak (Campanian weave, southern not local); rode a hired (not owned) mule", source: "ch-08:p183" }
    traits:
      - { trait: "careful townsman's speech, 'saying less than he knows'; framed a hunt as small talk — asked lightly, and 'light was the tell'", source: "ch-08:p183", mutable: false }
    relationships:
      valens:
        type: "came asking after Valens by his old fighting profession"
