      description: { value: "old or made-old; broad, bent, quick-eyed; hard hands", source: "ch-05:p115" }
    traits:
      - { trait: "misquotes proverbs, always slightly, always weaponised/bent-toward-mercy ('a lit lamp wastes no oil it wasn't going to waste')", source: "ch-05:p131", mutable: false }
