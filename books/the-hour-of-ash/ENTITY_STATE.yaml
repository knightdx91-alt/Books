    voice_markers:
      ref: "character-bible.md#drusus / voice-dna.md#drusus"
    relationships:
      valens:
        type: "trade partner (the factor's-widow place runs through him and the factor)"
        established: "ch-08:p17"
        current_status: "ch-08: comes up ahead of a consignment; the copered string he bought is exposed by Mara; Valens tallies his losses for him"
      mara-reyes:
        type: "swore to the factor there was 'a clever discreet woman going spare in the hills' — her trial rides on him"
        established: "ch-08:p63"
        current_status: "prices her as 'the expense', then watches her expose his copered string"
    location_log:
      - { chapter: 8, location: "Valens's mule-yard (came up on the fifth day ahead of his consignment)", scene: "arrives on a mule too good for him; complains of the wine; the consignment day; prices his own ruin aloud when the copered string is exposed", travel_noted: true }
    knowledge:
      - { fact: "his beast-string (bought cheap off a coper out of Amphissa) is copered — grey bishoped, dark mule gingered; two sound, one a loss", learned: "ch-08:p123", method: "witnessed (shown by Mara/Valens)" }
    debt:
      - { fact: "owes a named creditor money (interest on a sum); names his debt AND the creditor aloud in the yard, fast, 'the way you'd flinch from a hot pan'", source: "ch-08:p137", note: "creditor's name not given on the page ('a name that meant nothing to me then and would mean a great deal later'); ties to the legate-agent thread — Drusus names his debts loudly up and down the valley (Mara notes this, ch-08:p203)" }
    arc_notes: "New Ch.8 character. The venal/cost-worldview foil. Distinctness = reduces feeling to cost; explicitly NO shared counting/enumeration device with Valens (he prices; Fenn/Mara enumerate-as-mirror). His loud debt-naming is seeded as a danger vector tying to the legate's reach."
    needs_review: false

  factors-wool-clerk:
    canonical_name: "the factor's wool-clerk"
    aliases: ["the clerk", "the weasel (Drusus's word)"]
    importance: minor
