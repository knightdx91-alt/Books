    physical:
      description: { value: "a narrow young man with ink-stained fingers", source: "ch-08:p79" }
    traits:
      - { trait: "adversarial / condescending — did not offer Mara the stool; the patient smile of a man explaining a simple thing to a woman", source: "ch-08:p91", mutable: false }
    relationships:
