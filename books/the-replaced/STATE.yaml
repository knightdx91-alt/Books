project:
  title: "The Replaced"   # author-chosen 2026-07-14 (was generic "Nanobot"); the doppelganger-swap hook.
  genre: "Science Fiction"
  subgenre: "Transhuman / nanotech mystery, braided three-timeline"
  language: "English"
  word_count_target: 90000
  comp_titles: ["Recursion (Blake Crouch)", "Dark Matter (Blake Crouch)", "Dark (Netflix series)", "Cloud Atlas (David Mitchell)"]
  engagement_type: {primary: "fascination (SF puzzle-box mystery)", secondary: "dread (doppelganger paranoia / am-I-real horror)", tertiary: "empathy (the copy's identity crisis)"}
  premise: "Across a thousand years, three lives — the founder who discovers people are being swapped for doppelgangers, his centuries-old descendant who gains 'root' over reality via an original nanobot AI, and a created boy on the ark-ship Hope — converge on the truth of the nanotech remaking humanity."
  created: "2026-07-12"
  updated: "2026-07-12"

# ADAPTED RUN — revise/expand an existing draft, NOT genesis-from-idea.
adaptation:
  mode: "revise-existing-draft"
  canon_sources:
    # Fill these in once source material is staged into research/:
    original_draft:  "research/original-draft.md"   # raw prose to revise/expand
    # series_roadmap:  "research/series-roadmap.md"
    # character_bible: "research/character-bible.md"
    # chapter_roadmap: "research/chapter-roadmap.md"   # scene-by-scene plan (binding outline)
    # master_checklist:"research/master-checklist.md"
  chapter_1_locked: false        # set true if Ch.1 is a hand-finished voice benchmark
  chapters_to_produce: []        # e.g. [2,3,...,N]

word_floor:
  manuscript_min_words: 85000    # HARD FLOOR (book total) — the binding gate; adjust per book.
  manuscript_target_words: 90000 # architect budgets Σ chapter targets ≥ this (see book-architect §0.5).
  # NOTE: there is deliberately NO uniform per-chapter floor. Chapter lengths VARY WIDELY
  # (~1,500–7,000w) by design — the book TOTAL is what's enforced, not each chapter. A
  # per-chapter minimum would recreate the uniform ~5k/20-chapter "AI-neat" shape.
  shortest_chapter_floor: 1200   # sanity floor for the SHORTEST allowed chapter (punch chapters ok; not a target)

phase:
  current: 1
  status: "SPINE DEVELOPED & LOCKED (2026-07-13) — research/spine-locked.md holds the full canon spine: braided three-timeline SF mystery (standalone); aliens-behind-doppelgangers with the invasion-is-a-RESCUE world reveal + hero-is-a-COPY personal layer (both Darin and the Boy); Mark = last biological anchor; extinction = nanotech runaway conversion (proposed). Comps + engagement types set. READY for architect pass (foundation.md + outline.md + voice-dna.md). NOT yet run."
  history: []

chapters:
  total_planned: 0
  completed: []
  scores: {}

genesis_score:
  current_floor: 0.0
  current_average: 0.0

quality_gate:
  chapters_passed: []
  chapters_escalated: []

guardrails:
  - "Genesis Floor >= 8.5 per chapter (book-evaluator); polish-loop via book-editor (max 5)."
  - "Style gate: python3 tools/style_check.py must stay clean (simile <=4/1k, em-dash <=~10/1k, no NEW cross-chapter repeated phrase, tics under ceiling). Add this book's deliberate motifs to ALLOWLIST in tools/style_check.py."
  - "Word floor >= manuscript_min_words; verify with: wc -w manuscript/chapters/chapter-*.md."
  - "Revise/expand the original draft to the roadmap; do NOT invent from scratch. Match the locked Ch.1 voice if one exists."
  - "SPINE LOCKED (2026-07-13): see research/spine-locked.md — the architect BUILDS ON it, does not overwrite. Braided three-timeline SF mystery, STANDALONE. Threads: Mark (1000ya, CIA founder, ORIGIN, the LAST truly biological POV) / the Boy (500ya, ark-ship Hope, restoration seed, a COPY) / Darin Markson (now, gains 'root', the LEVER, also a COPY)."
  - "REVEAL STACK (fair-play; plant across all 3 timelines): (1) surface = alien invasion swapping people for doppelgangers, to STOP; (2) world reveal = the invasion is a RESCUE — genuinely-Other aliens copy people into durable substrate to save them from a coming extinction; Hope's 'restore true humanity' mission would UNDO the rescue and doom everyone; (3) personal reveal = the hero is a COPY (BOTH Darin and the Boy) who believes he's human → restoration is self-negating. Aliens kept mostly UNSEEN, revealed by consequence not exposition."
  - "Extinction (proposed, adjustable): the nanotech's OWN runaway conversion cascade consumes all biological matter — disease and cure are the same tech, tying the doom to Mark's origin. Theme: is a perfect copy that remembers being you still you, and is 'true humanity' worth extinction? Authenticity vs survival."
  - "Cross-book: keep DISTINCT from All the Worlds She Keeps (that's a cozy portal romance with a 'necessary-but-complacent institution' — this is a cold hard-SF paradox with an alien rescue). Per-timeline POV voices must not rhyme."

open_author_decisions:
  - "RESOLVED 2026-07-13: aliens (truly Other) behind the doppelgangers; invasion-is-a-rescue world reveal; hero-is-a-copy personal layer (both Darin AND the Boy); hard-ish SF mystery, standalone. See research/spine-locked.md + guardrails."
  - "PROPOSED (confirm/adjust): the extinction = nanotech runaway conversion; the two items flagged (proposed) in spine-locked.md."
  - "Architect to PROPOSE: real title (author pages say 'Nanobot Trio'); the aliens' name/nature; the rules & LIMITS of 'root'; the fair-play clue seeding across timelines; the refusers'/Hope's launch history; the Boy's creators."

decisions:
  - "This book is a folder-per-book genesis project under book/genesis/the-replaced/."
revision_cycles: 0
