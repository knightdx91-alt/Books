project:
  title: "The Fourfold Crown"   # author-chosen 2026-07-14 (was working "Black Jewels–like book"); the prophecy/uniter-King + forbidden 4th gem hook.
  genre: "Fantasy"
  subgenre: "Epic / gaslamp fantasy (gem-rank magic)"
  language: "English"
  word_count_target: 100000
  comp_titles: ["The Black Jewels Trilogy (Anne Bishop)", "Mistborn (Brandon Sanderson)", "Shadow and Bone (Leigh Bardugo)"]
  engagement_type: {primary: "fascination (rank/gem system)", secondary: "self_insertion (orphan rises)", tertiary: "empathy"}
  premise: "A one-rank orphan, dedicating alone at a backwater shrine because no house will sponsor him at the great temple, is gifted a forbidden fourth gem by a disguised goddess. He must hide TWO secrets from TWO predators — a Church/Crown that outlaws his true 3rd (Trinity) rank, and a hidden faction that harvests high-rank bearers behind the cover of that very taboo — while a prophecy names his chest-borne 4th gem as the uniter-King who could end them both."
  created: "2026-07-13"
  updated: "2026-07-13"

# ADAPTED RUN — revise/expand an existing draft, NOT genesis-from-idea.
adaptation:
  mode: "revise-existing-draft"
  canon_sources:
    # Fill these in once source material is staged into research/:
    original_draft:  "research/source-notes.md"   # raw prose to revise/expand
    # series_roadmap:  "research/series-roadmap.md"
    # character_bible: "research/character-bible.md"
    # chapter_roadmap: "research/chapter-roadmap.md"   # scene-by-scene plan (binding outline)
    # master_checklist:"research/master-checklist.md"
  chapter_1_locked: false        # set true if Ch.1 is a hand-finished voice benchmark
  chapters_to_produce: []        # e.g. [2,3,...,N]

word_floor:
  manuscript_min_words: 85000    # HARD FLOOR (book total) — the binding gate; adjust per book.
  manuscript_target_words: 90000 # architect budgets Σ chapter targets ≥ this (see book-architect §0.5).
  # NOTE: there is deliberately NO uniform per-chapter floor. Chapter lengths VARY WIDELY
  # (~1,500–7,000w) by design — the book TOTAL is what's enforced, not each chapter. A
  # per-chapter minimum would recreate the uniform ~5k/20-chapter "AI-neat" shape.
  shortest_chapter_floor: 1200   # sanity floor for the SHORTEST allowed chapter (punch chapters ok; not a target)

phase:
  current: 1
  status: "source staged + CORE DECISIONS LOCKED (2026-07-13): central conflict (taboo+hunted as one system), 4th gem (chest/uniter-King), age reconciliation, Bishop-distinctiveness guardrail. READY for architect pass (foundation.md + outline.md + voice-dna.md). Not yet blueprinted. (Separate story from Sygl per author — do NOT merge.)"
  history: []

chapters:
  total_planned: 0
  completed: []
  scores: {}

genesis_score:
  current_floor: 0.0
  current_average: 0.0

quality_gate:
  chapters_passed: []
  chapters_escalated: []

guardrails:
  - "Genesis Floor >= 8.5 per chapter (book-evaluator); polish-loop via book-editor (max 5)."
  - "Style gate: python3 tools/style_check.py must stay clean (simile <=4/1k, em-dash <=~10/1k, no NEW cross-chapter repeated phrase, tics under ceiling). Add this book's deliberate motifs to ALLOWLIST in tools/style_check.py."
  - "Word floor >= manuscript_min_words; verify with: wc -w manuscript/chapters/chapter-*.md."
  - "Revise/expand the original draft to the roadmap; do NOT invent from scratch. Match the locked Ch.1 voice if one exists."
  - "Gem-rank magic: no gem / left hand / +right hand / +forehead (Trinity is rare); the hidden 4th gem is unique to the MC. Maturity dedication at 16 (F) / 18 (M). Domains as regions. Keep distinct from Sygl's sigil system — separate story."
  - "CENTRAL CONFLICT (locked): taboo AND hunted, as ONE system. The Church/Crown outlawed the Trinity (3rd rank) generations ago on stated grounds of piety ('no mortal should hold such power'); a hidden faction uses that prohibition as cover to HARVEST Trinity bearers for their power (a vanished Trinity reads as 'taken for illegal rank'). The taboo ENABLES the hunt — do not let the two pressures become separate/competing threads."
  - "THE 4TH GEM (locked): sits at the CENTER OF THE CHEST (distinct from the forehead Trinity slot). Prophecy names it the uniter-'King' meant to unite the Domains against a coming threat and end the faction. Both Church and faction want him gone; a resistance would protect him. Unique to the MC; hideable from all lower ranks."
  - "AGE reconciliation (locked): army recruits dedicate ON ENLISTMENT at 17, ahead of the civilian maturity rite (18 M / 16 F). The orphan MC has no house to sponsor him at the great temple, so he dedicates ALONE at the backwater shrine — which is why the goddess finds him solo. 'Domash' army spelling kept as-is."
  - "DISTINCTIVENESS from Anne Bishop (hard): inspired-by only. Invent our OWN gem/color rank ladder, ceremony names, Domain names, deity/faction names. Do NOT lift Bishop's signature terms (Jewels, Blood/landen, Territories, Offering, caste, Warlord Prince, etc.). The placement-tier system (hands/forehead/chest + Domains + dedication) is already ours — keep it that way."
  - "WORLDBUILDING LOCKED (2026-07-13): see research/worldbuilding-locked.md — the architect BUILDS ON it, does not overwrite. Two-axis magic (placement=tier / celestial grade Dawn->Dusk->Star->Void = depth). Cosmology: gems are goddess Neth's night-light in stone; she bound the titan Ossuth (First Dark) at the founding, pouring herself into the Binding, so her FADING = rarer deep-gems = weakening Binding (one fact, three faces). Faction = the Vigil (maintains the Binding by harvesting deep-gems) with rotten inner cabal the Ashen Court (hoard deep-gems to stay immortal, hastening the failure); Trinity taboo is their supply line. On-page villains stay HUMAN; Ossuth is the off-page clock. Keystone-King prophecy = unite living bearers so SHARED light renews the Binding. Theme: hoarded dying light vs shared living light. Names (Vigil/Ashen Court/Neth/Ossuth) proposed, pending final author sign-off."

open_author_decisions:
  - "RESOLVED 2026-07-13: central conflict = taboo AND hunted (one system); 4th gem = chest / uniter-King; age = 17 army-enlistment dedication; Domash kept. See guardrails."
  - "Architect to propose: the gem COLOR/rank ladder (names + order), the faction's name + what they use harvested power FOR, the deity's name, and the Domain map. (Invent — keep distinct from Bishop.)"
  - "Title RESOLVED 2026-07-14 → 'The Fourfold Crown'."

decisions:
  - "This book is a folder-per-book genesis project under book/genesis/<slug>/."
revision_cycles: 0
