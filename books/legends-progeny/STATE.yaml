project:
  title: "Legend's Progeny"   # author-chosen 2026-07-14 (was working "LitRPG — James Mason"; MC James Mason). His in-world title; series name across the seven towers.
  genre: "LitRPG / progression fantasy"
  subgenre: "Portal-fantasy LitRPG (beast-taming)"
  language: "English"
  word_count_target: 110000
  comp_titles: ["He Who Fights with Monsters (Shirtaloon)", "The Divine Dungeon (Dakota Krout)", "Awaken Online (Travis Bagwell)"]
  engagement_type: {primary: "self_insertion", secondary: "fascination", tertiary: "empathy"}
  premise: "Orphaned by a suspicious crash, James Mason opens the sealed box his grandfather left him and is pulled into the Cygnis system — a world of levels, classes and towers — where an inherited forbidden portal ability and an ancient Beast Tamer growth class mark him as a legend's heir."
  created: "2026-07-13"
  updated: "2026-07-13"

# ADAPTED RUN — revise/expand an existing draft, NOT genesis-from-idea.
adaptation:
  mode: "revise-existing-draft"
  canon_sources:
    # Fill these in once source material is staged into research/:
    original_draft:  "research/source-notes.md"   # raw prose to revise/expand
    # series_roadmap:  "research/series-roadmap.md"
    # character_bible: "research/character-bible.md"
    # chapter_roadmap: "research/chapter-roadmap.md"   # scene-by-scene plan (binding outline)
    # master_checklist:"research/master-checklist.md"
  chapter_1_locked: false        # set true if Ch.1 is a hand-finished voice benchmark
  chapters_to_produce: []        # e.g. [2,3,...,N]

word_floor:
  manuscript_min_words: 85000    # HARD FLOOR (book total) — the binding gate; adjust per book.
  manuscript_target_words: 90000 # architect budgets Σ chapter targets ≥ this (see book-architect §0.5).
  # NOTE: there is deliberately NO uniform per-chapter floor. Chapter lengths VARY WIDELY
  # (~1,500–7,000w) by design — the book TOTAL is what's enforced, not each chapter. A
  # per-chapter minimum would recreate the uniform ~5k/20-chapter "AI-neat" shape.
  shortest_chapter_floor: 1200   # sanity floor for the SHORTEST allowed chapter (punch chapters ok; not a target)

phase:
  current: 2
  status: "architect complete — foundation.md + outline.md + voice-dna.md built; ready to draft Chapter 1"
  history:
    - "2026-07-13: scaffolded; source-notes.md staged (drafted opening pg.1-8 + author planning notes)"
    - "2026-07-13: architect pass complete — foundation/outline/voice-dna. 26 chapters, 5-movement progression ladder, Σ≈115k words. Two open decisions made provisionally (grandfather = native Seminovan legend Corin Vale/Threshold-Walker; ONE tower per book, Book 1 = Strength Tower)."

chapters:
  total_planned: 26
  completed: []
  scores: {}

genesis_score:
  current_floor: 0.0
  current_average: 0.0

quality_gate:
  chapters_passed: []
  chapters_escalated: []

guardrails:
  - "Genesis Floor >= 8.5 per chapter (book-evaluator); polish-loop via book-editor (max 5)."
  - "Style gate: python3 tools/style_check.py must stay clean (simile <=4/1k, em-dash <=~10/1k, no NEW cross-chapter repeated phrase, tics under ceiling). Add this book's deliberate motifs to ALLOWLIST in tools/style_check.py."
  - "Word floor >= manuscript_min_words; verify with: wc -w manuscript/chapters/chapter-*.md."
  - "Revise/expand the original draft to the roadmap; do NOT invent from scratch. Match the locked Ch.1 voice if one exists."
  - "System canon: status screens/stats (STR/VIT/AGI/WIS/INT/CHA/LUCK), class rarities common→uncommon→rare→epic→ancient→legendary→mythic; MC's Beast Tamer (Ancient) growth class; beta bond Dapple (iron-hide wolf cub, ancient); title 'Legend's Progeny'; seven towers (one per stat except luck, done in order, ~tower per book); world 'Seminova' / Cygnis system. MC James Mason — distinct from full-dive (the Josh book)."
  - "NO ROMANCE: per author source, James makes friends but has NO romantic interests. Do NOT add a love line or harem. The girl who parties up for the first tower is an ally/party member, not a love interest."

open_author_decisions:
  - "Confirm whether the grandfather was originally from Seminova and the source of the portal ability."
  - "Lock tower structure: one tower per book, or more per book?"

decisions:
  - "This book is a folder-per-book genesis project under book/genesis/<slug>/."
revision_cycles: 0
