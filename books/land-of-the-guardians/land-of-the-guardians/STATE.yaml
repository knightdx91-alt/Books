decisions:
  - "THE ORIGIN SETTING (CANON 2026-07-12): the old world is LITERALLY our Earth — rural England, the year of our Lord 1697. Option A alt-history APOCALYPSE: reads as historical fiction, then Earth is consumed and the sibling worlds are born from it (real timeline does not continue). Real geography/tech/voice required. Persecution = the real, BOTTOM-UP witch-hunt (Crown cooling by 1697, but village mobs/zealots still hunt). Father = hidden true power; persecutors are period zealots, NOT a polemic against real Christianity. Power is conserved (mark transfers on death) so the five die totally but their power precipitates into the dragons. See series-bible PART 3 + PART 0.5."
  - "COSMOLOGY (CANON 2026-07-12): the Origin shatters the old world into a CLUSTER OF SIBLING WORLDS. World G = Guardians (dragons/elves/Moonwalkers, Alten native). World N = Father's sacred world (Son of None). World C = Gorlak homeworld. Dragons exist across sibling worlds. See series-bible PART 0.5."
  - "ALTEN POWER (CANON 2026-07-12): dragon-heart GRAFTING. 5 hearts (one per element) implanted into body sites (Fire=R palm, Water=L palm, Air=throat, Earth=sternum, Spirit=over his heart). Each = element mastery + longevity + DISTRIBUTED LIFE (can't be killed while a heart beats — must destroy/remove the hearts) + a corruption cost (withers/greys him → the 'kindly old man'). Heart count = the series doomsday tally; all 5 = godlike + gateway stabilized. See series-bible PART 0.6."
  - "ALTEN FLEES, does not conquer (CANON 2026-07-12): Guardians climax = heroes take one heart; cornered Alten tears a gateway and flees to World N, NOT knowing it is Father's world; gateway collapses; Guardians heroes CANNOT follow (no heart-power). This is why the Guardians cast is absent from Son of None."
  - "STRUCTURE: Land of the Guardians = ONE complete book ending on the flight + waking the kingdom (recommended, tentatively set). Dragon Isle = Book 2 only if material earns it."
  - "Male human twin renamed 'Aeron' (CANON, author 2026-07-12). The bible's 'Knight' and the reading's 'Xavier' are both in use in the author's OTHER books; Aeron is a fresh name in the same sound-family (Selena/Reagen/Raveena/Alverin/Alten). Update the black-dragon-color reference accordingly."
  - "Folder-per-book genesis project under book/genesis/land-of-the-guardians/."
  - "The universe series bible is maintained HERE (the canon-locking book), not in son-of-none/."
revision_cycles: 0
