project:
  title: "Land of the Guardians"
  genre: "Epic Fantasy"
  subgenre: "Sword & sorcery / coming-of-age ensemble"
  language: "English"
  word_count_target: 90000
  comp_titles: []
  engagement_type: {primary: "adventure", secondary: "found-family resistance", tertiary: "dragon lore mystery"}
  premise: "On the world of Ne'veran, three sets of teenagers — human twins Aeron & Selena, elven twins Katy & Reagen, and the trader Seiss with the Moonwalker Wolf — are forced from their homes on the same day and converge into a resistance against High King Alten, who hunts the world's hidden dragons for the elemental power sealed in their hearts."
  created: "2026-07-12"
  updated: "2026-07-12"

# Part of the Ne'veran universe (3-4 books). Universe bible: research/series-bible.md.
# Series order (author-confirmed 2026-06-22, see research/series-order-decision.md):
#   Publication: Land of the Guardians -> The Dragon Isle -> Son of None -> The Origin
#   Writing:     Son of None SPINE-LOCK (done) -> Land of the Guardians (THIS, active) ->
#                Dragon Isle -> Son of None POLISH -> The Origin (last)
series:
  universe: "Ne'veran"
  this_book_role: "chronological book 2; write & publish FIRST (strongest hook, on-ramp)"
  canon_role: "CANON-LOCKING — the decisions made here bind Son of None's final polish"
  villain_spine: "High King Alten; theme = power, sacrifice, consumption"

# GENESIS-FROM-SOURCE — build the book from the author's reading + the series bible.
adaptation:
  mode: "genesis-from-author-source"
  canon_sources:
    series_bible:      "research/series-bible.md"              # universe canon (Part 2 = this book)
    series_order:      "research/series-order-decision.md"     # what to lock vs. defer
    authors_reading:   "research/authors-reading-prologue-ch1.md"  # author's own prologue + ch.1 (voice seed)
  chapter_1_locked: false        # author's recorded prologue+ch1 is the voice/canon seed, not yet a locked draft
  chapters_to_produce: []        # set once outline.md chapter count is fixed

word_floor:
