project:
  title: "The Power Thief"   # author-chosen 2026-07-14 (was "The Manipulators"); the amnesiac who steals & gifts powers.
  genre: "Science Fiction / Fantasy"
  subgenre: "Epic power-system saga (progression / superhuman)"
  language: "English"
  word_count_target: 110000
  comp_titles: []   # architect + researcher to fill (progression-fantasy / super-powered comps)
  engagement_type: {primary: "power-system escalation", secondary: "amnesia mystery", tertiary: "chase/survival"}
  premise: "An amnesiac who can steal powers and gift them to others escapes a facility manufacturing reality-benders, and must relearn who he is before the organization that made him remakes the world."
  created: "2026-07-12"
  updated: "2026-07-12"

# GENESIS-FROM-SEED — build world/outline from the dream seed, then draft.
adaptation:
  mode: "genesis-from-seed"
  canon_sources:
    dream_seed: "research/dream-seed.md"   # origin images + mythology to reverse-engineer
  chapter_1_locked: false        # dream transcript is a SEED, not a locked Ch.1 voice benchmark
  chapters_to_produce: []        # set once outline exists

word_floor:
  manuscript_min_words: 85000    # HARD FLOOR (book total) — the binding gate; adjust per book.
  manuscript_target_words: 90000 # architect budgets Σ chapter targets ≥ this (see book-architect §0.5).
  # NOTE: there is deliberately NO uniform per-chapter floor. Chapter lengths VARY WIDELY
  # (~1,500–7,000w) by design — the book TOTAL is what's enforced, not each chapter. A
  # per-chapter minimum would recreate the uniform ~5k/20-chapter "AI-neat" shape.
  shortest_chapter_floor: 1200   # sanity floor for the SHORTEST allowed chapter (punch chapters ok; not a target)

phase:
  current: 1
  status: "SESSION-END 2026-07-12: author ratified decay-only cost + unique-Kevin + mundane amnesia; REJECTED the Carry, the Curator, and old secret. foundation.md/outline.md are REVISION-1 (banner-flagged, still contain stale Carry/Curator/old-secret). Revision-2 pass NOT yet written — do it next session, then draft."
  history:
    - "2026-07-12 scaffolded + dream seed staged; STATE premise/genre set (epic power-system saga)"
    - "2026-07-12 architect pass: foundation.md (power economy, cosmic Law, org, characters, theme, voice DNA) + outline.md (4-movement kishotenketsu braid, 25 ch, Σ109.2k) written; 10 OPEN FOR AUTHOR decisions pending ratification"
    - "2026-07-12 architect revision pass: amnesia -> mundane head trauma (content mystery); holding-tax memory -> THE CARRY (borrowed instincts crowd Kevin's self); mirror antagonist Reach-successor -> THE CURATOR (manufactured partial-Vessel, absorb-not-gift). foundation.md + outline.md revised, grep-clean of orphans; OPEN FOR AUTHOR updated"

chapters:
  total_planned: 25
  completed: []
  scores: {}

genesis_score:
  current_floor: 0.0
  current_average: 0.0

quality_gate:
  chapters_passed: []
  chapters_escalated: []

guardrails:
  - "Genesis Floor >= 8.5 per chapter (book-evaluator); polish-loop via book-editor (max 5)."
  - "Style gate: python3 tools/style_check.py must stay clean (simile <=4/1k, em-dash <=~10/1k, no NEW cross-chapter repeated phrase, tics under ceiling). Add this book's deliberate motifs to ALLOWLIST in tools/style_check.py."
  - "Word floor >= manuscript_min_words; verify with: wc -w manuscript/chapters/chapter-*.md."
  - "Power-system is the plot engine: absorb/transfer rules and Manipulator binding rules are HARD CANON once the architect locks them. No fight or twist may violate them."
  - "Settled from the seed: protagonist Kevin Jones (22, amnesiac, absorbs+gifts powers); ally Jake Hobb (blond, green eyes, can fly via Kevin's gift); they met 6 years ago in Panama City; antagonist force is the organization manufacturing 'Manipulators' (reality-benders)."
  - "The dream-seed prose is NOT canon voice — do not paste it into the manuscript; rebuild scenes fresh."
  - "POWER CANON (author-ratified 2026-07-12): (a) ABSORB = THEFT — the original owner LOSES the power (zero-sum, predatory). (b) GIFT = SELF-SACRIFICE — to give a power to someone else, Kevin gives it AWAY and no longer has it himself. (c) IMPERMANENCE — held/gifted powers DECAY over time unless maintained/renewed (ticking-clock economy; architect designs exact mechanic). This explains the seed: Kevin gave Jake flight and so couldn't fly himself until he 'remembered'/re-took it."
  - "MANIPULATOR CANON (author-ratified): the reality-benders are bound by a COSMIC LAW OF REALITY — a metaphysical force larger than the organization, not merely engineered constraints. The universe pushes back on reality-bending."
  - "SCOPE: one complete standalone book (seed a larger runway but resolve a full arc)."
  - "AMNESIA CANON (author-ratified 2026-07-12): Kevin's amnesia is BLUNT HEAD TRAUMA — the head wound/bandage from the seed. NOT power-related, NOT self-erasure, NOT a memory-tax. Mundane cause; the mystery is WHAT he forgot, not an exotic mechanism."
  - "HOLDING-TAX CANON: powers still DECAY (impermanence confirmed), but the cost of holding is NOT memory. Architect to design a different tax (physical/biological/attention). Memory-as-fuel is REJECTED."
  - "ANTAGONIST-MIRROR: do NOT bring back The Reach or a Reach successor as the mirror. Architect to design a different 'you're the real thief' mirror antagonist."
  - "NAMES: Meridian Continuity / the Vaults / 'to empty' / the Weight approved PROVISIONALLY (author may rename later) — proceed, keep editable."
  - "STRUCTURE: four-movement kishotenketsu braid, 25 chapters — APPROVED."
  - "HOLDING-TAX FINAL (author 2026-07-12): DECAY ONLY. THE CARRY is CUT (no borrowed-instinct/physical/cosmic tax). Multi-hold ceiling kept only if decay alone justifies it."
  - "KEVIN IS UNIQUE (author 2026-07-12): Meridian CANNOT manufacture Vessels. THE CURATOR (partial-Vessel) is CUT. Main antagonist to be designed fresh by architect, author to ratify."
  - "BURIED SECRET: rework (drop emptied-a-loved-one / Vault-return). Amnesia stays mundane head trauma. Architect proposes fresh, author ratifies."

open_author_decisions:
  - "Power-system rules (architect to propose, author to ratify): absorb removes or copies? multi-hold limit? does gifting cost Kevin the power? range/contact/consent? Kevin's OWN baseline power vs borrowed?"
  - "What exactly binds the Manipulators — organizational law or a cosmic force? (major worldbuilding fork; affects whole saga)"
  - "Cause AND purpose of Kevin's amnesia."
  - "Jake's watch — real device or dream prop? Keep or cut?"
  - "The organization's name, goals, and scale; the story's underlying theme."
  - "Series scope: standalone-with-sequel-hook vs planned multi-book saga."

decisions:
  - "This book is a folder-per-book genesis project under book/genesis/the-power-thief/."
revision_cycles: 0
