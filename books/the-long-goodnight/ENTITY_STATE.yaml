    resolution: null

  green-hatchback:
    introduced: "ch-01:p07"
    description: "Anna's green hatchback 'that had seen some winters'; the car she drives"
    status: background
    last_mentioned: "ch-02:p44"
    resolution: null

  store-door-hinge:
    introduced: "ch-02:p16"
    description: "the store's screen door, top hinge pulled half out of the jamb, catching for a month; Xavier repairs it by plugging the stripped holes with matchsticks and glue and rehanging it true"
    status: chekhov_closed
    last_mentioned: "ch-02:p19"
    resolution: { chapter: 2, paragraph: 17, description: "Xavier fixes the door; it swings true and the latch catches clean — proves his usefulness and prompts the hire" }

  dead-jukebox:
    introduced: "ch-01:p49"
    description: "a dead, unplugged jukebox in the corner of the crossroads diner, its cord looped over the top; triggers Xavier's memory of Selena and the unnamed song"
    status: background
    last_mentioned: "ch-01:p49"
    resolution: null

  the-unnamed-song:
    introduced: "ch-01:p49"
    description: "a song that was playing at some diner years ago when Xavier was with Selena; he can recall every detail of the memory except the song's name, which sits 'just past where he could reach'"
    status: chekhov_open
    last_mentioned: "ch-01:p49"
    resolution: null

world_rules:
  - { rule: "Strict single third-limited POV (Xavier only) — the narrative conveys only what Xavier perceives/knows", source: "ch-01:p05" }
  - { rule: "Holmes General Store closes at six", source: "ch-01:p67" }
  - { rule: "George Holmes does not hire strangers — only people who have 'been introduced'", source: "ch-02:p42" }
  - { rule: "Anna lives about a mile past the church, outside Jamestown, though she is at the store more than at home", source: "ch-02:p34" }

knowledge_gaps: []
