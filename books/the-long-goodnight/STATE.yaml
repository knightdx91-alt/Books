project:
  title: "The Long Goodnight"
  genre: "Romantic suspense"
  subgenre: "Small-town romantic suspense / whodunit"
  language: "English"
  word_count_target: 85000
  comp_titles: ["Northern Lights (Nora Roberts)", "The Witness (Nora Roberts)", "Behind Closed Doors (B.A. Paris)"]
  engagement_type: {primary: "empathy", secondary: "fascination (whodunit)", tertiary: "dread"}
  premise: "Three years after a drunk driver killed his wife, a grief-numbed drifter takes a job at a small-town general store and lets himself love the owner's daughter — just as someone starts stalking her, and the town, including her, begins to wonder if the trouble arrived with the stranger."
  created: "2026-07-13"
  updated: "2026-07-13"

# ADAPTED RUN — revise/expand an existing draft, NOT genesis-from-idea.
adaptation:
  mode: "revise-existing-draft"
  canon_sources:
    # Fill these in once source material is staged into research/:
    original_draft:  "research/original-handwritten-draft.md"   # raw prose to revise/expand
    # series_roadmap:  "research/series-roadmap.md"
    # character_bible: "research/character-bible.md"
    # chapter_roadmap: "research/chapter-roadmap.md"   # scene-by-scene plan (binding outline)
    # master_checklist:"research/master-checklist.md"
  chapter_1_locked: false        # set true if Ch.1 is a hand-finished voice benchmark
  chapters_to_produce: []        # e.g. [2,3,...,N]

word_floor:
  manuscript_min_words: 85000    # HARD FLOOR (book total) — the binding gate; adjust per book.
  manuscript_target_words: 90000 # architect budgets Σ chapter targets ≥ this (see book-architect §0.5).
  # NOTE: there is deliberately NO uniform per-chapter floor. Chapter lengths VARY WIDELY
  # (~1,500–7,000w) by design — the book TOTAL is what's enforced, not each chapter. A
  # per-chapter minimum would recreate the uniform ~5k/20-chapter "AI-neat" shape.
  shortest_chapter_floor: 1200   # sanity floor for the SHORTEST allowed chapter (punch chapters ok; not a target)

phase:
  current: 1
  status: "scaffolded — awaiting source material in research/, then architect"
  history: []

chapters:
  total_planned: 0
  completed: []
  scores: {}

genesis_score:
  current_floor: 0.0
  current_average: 0.0

quality_gate:
  chapters_passed: []
  chapters_escalated: []

guardrails:
  - "Genesis Floor >= 8.5 per chapter (book-evaluator); polish-loop via book-editor (max 5)."
  - "Style gate: python3 tools/style_check.py must stay clean (simile <=4/1k, em-dash <=~10/1k, no NEW cross-chapter repeated phrase, tics under ceiling). Add this book's deliberate motifs to ALLOWLIST in tools/style_check.py."
  - "Word floor >= manuscript_min_words; verify with: wc -w manuscript/chapters/chapter-*.md."
  - "Revise/expand the original draft to the roadmap; do NOT invent from scratch. Match the locked Ch.1 voice if one exists."
  - "Small-town romantic suspense with a whodunit spine; slow-burn grief romance braided with an escalating stalker mystery. Canon blueprint in outline.md, voice-dna.md, character-bible.md, ENTITY_STATE.yaml. Canon names Xavier (was Troy) / Derek (was Chris); the handwritten draft (research/) is pre-canon source, NOT canon."
  - "POV (amended 2026-07-13): primary POV is strict single third-limited Xavier ONLY, plus 3-4 concealed-antagonist 'Watcher' interludes (the sole non-Xavier POV). Watcher is Derek but must NEVER read as identifiable: never named/self-described, refers to himself as 'he', withholds-never-lies (every line true after the Ch27 reveal), no single-suspect tell before its fair-play window, a deliberately un-matchable 4th voice. First interlude no earlier than post-Ch9. Consequence: reader no longer suspects Xavier (interludes show a separate consciousness); Xavier-as-suspect survives as TOWN suspicion only; reader's whodunit = Derek vs Caleb. Interlude map in chapter-outline.md; concealment rules in outline.md POV lock + voice-dna Watcher card."

open_author_decisions:
  - "Reconcile the 2 drafted chapters + handwritten draft to canon names before continuing."
  - "Migrate chapters/*.md into manuscript/chapters/ for pipeline consistency, or keep as-is?"

decisions:
  - "This book is a folder-per-book genesis project under book/genesis/<slug>/."
revision_cycles: 0
