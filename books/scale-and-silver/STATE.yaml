  # --- Settled author canon (from the bible — never violate) ---
  - "Spelling is 'magyk' (not magic) when naming the in-world power."
  - "Vampires descend from Atlanteans (a failed disease-cure experiment). Vampire society runs a feudal 'protection' pact over humans; ruled by a Queen with blood magyk."
  - "Shifters: human until the first full moon AFTER their coming-of-age; first shift assigns them to the clan of their animal; ancestral memory trickles in situationally, never as one info dump. Ruled by a single chief over all clans. NOTE (NA recast 2026-07-06): most shift on time, but LATE/anomalous shifters exist and are rare/stigmatized — Korvan is one (still unshifted well past the usual age), which is why he is ~19-20 and an outsider, and why his eventual dragon-shift is a shock."
  - "The Treaty: no NEW vampires may be made (vampires had encroached on shifter lands). It is silent on natural-born vampires because none were thought possible."
  - "Amelia = Queen's daughter, first natural-born vampire in millennia, inherited blood magyk (which should not be heritable); hidden her whole life; want = to exist openly. No PROOF exists that she is born vs made."
  - "Korvan = chief's son; UNSHIFTED at the banquet; first shift happens on the journey home (calendar coincidence, NOT magically triggered) and he becomes a DRAGON — a clan of one, no elders/traditions."
  - "Loric = antagonist, shifter whose father the Queen killed in the last war; motive is emotional (wants the Queen to SUFFER), not strategic; cannot be bought/negotiated; exposes Amelia publicly so the chief loses either way."
