project:
  title: "The Hour of Ash"   # author-chosen 2026-07-06 (was working title "Pompeii"; avoid bare "Pompeii" — Robert Harris owns that)
  genre: "Historical romance / time-slip fantasy"
  subgenre: "Time-travel romance (Outlander-style), ancient Rome"
  language: "English"
  word_count_target: 260000   # long single volume, Outlander-scale
  comp_titles: ["Outlander (Diana Gabaldon)"]
  engagement_type: {primary: "empathy (55%)", secondary: "fascination (30%)", tertiary: "self-insertion (15%)"}
  premise: "A modern woman who inherited her late father's love of the ancient world buys an antique map said to lead to the Library of Alexandria, follows its coordinates, and opens a door into 1st-century Rome — where the Oracle of Delphi tells her where (but not when) the door home will reopen, she falls in love with a disgraced ex-gladiator, builds a family, and must choose between them and her own survival as Vesuvius erupts over Pompeii."
