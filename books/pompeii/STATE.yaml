  - "Build to the story bible; honor the beat order; historically accurate 'to a certain point' (Outlander standard) — real period detail + real political backdrop, fictional leads."
  # --- Settled author canon ---
  - "TONE/SCOPE: Outlander-style sweeping time-slip historical romance. ONE long standalone (~260k target, 220k floor) running all the way through the eruption and her final choice."
  - "HISTORY: Flavian era. She arrives ~70 AD (Vespasian, r.69-79); romance + family span ~9 years; Vesuvius erupts 79 AD under Titus. NOT Nero (died 68). Keep the political backdrop accurate."
  - "MAP: purports to lead to the lost LIBRARY OF ALEXANDRIA; the real secret beneath the legend is a door through time. Bought at an estate sale of a self-proclaimed treasure hunter who vanished (left notes + coordinates); shopkeeper bought it only because it was accurate for its period."
  - "MECHANISM: following the coordinates opens a time-door. She lands first in GREECE (Delphi). The ORACLE OF DELPHI tells her WHERE the door home is (Pompeii) but NOT WHEN it opens; she learns the 'when' later by other means."
  - "GREECE FIRST: a lone foreign woman in antiquity cannot simply travel — she must establish footing/protection in Greece before the long journey to Pompeii. Use this constraint as real obstacle, not hand-waved."
  - "LOVE INTEREST: a disgraced EX-GLADIATOR accused of an affair with the emperor's wife (the accusation ruined/exiled him). They marry and have children over years in the past."
  - "CLIMAX: when she tries to leave, her family cannot pass through to the future. Choice = stay in the past with them or leave to save herself, AS Vesuvius erupts. The eruption is the literal + emotional ticking clock."
  - "ROMANCE HEAT: explicit when it occurs (on-page, detailed, sensual) BUT NOT a smut/erotica book. Intimacy is OCCASIONAL and earned — driven by story/emotional beats, not a quota. NOT a sex scene every ~10 pages. The romance and history carry the book; explicit scenes are punctuation, not the substance. Frequency: a handful of meaningful on-page scenes across the ~260k arc (e.g. first union, key relationship turns), with tension/yearning doing most of the work."
  - "AUTHENTICITY DIAL (author-chosen 2026-07-06 — 'best of both', tuned for the commercial market): SPLIT the dial, do NOT pick one number.
     (a) SENSORY / TEXTURAL SPECIFICITY = crank to ~8+ (the top of what the Pompeii record allows). Use REAL, specific, period-correct material detail as the immersion engine and the marketing hook: the carbonized loaf with the baker's stamp, Pliny's black-noon sky and the pumice fall, garum, insulae and street life, oil lamps, the physical texture of 79 AD. These specific evocative details are FREE MARKETING (excerptable, shareable) and make the book FEEL deeply authentic.
     (b) HARSHNESS / PACE / READER-COMFORT = hold Outlander-level ~7, romance-forward. Keep the alienness of 1st-c Rome (slavery, gender/status powerlessness, brutality) REAL and present but do NOT wallow in it or let it grind the romance/pace down — soften edges the way Outlander does; escapism and emotional immersion win ties. Do not sanitize history away, but do not let grim rigor depress the read.
     Net target: authentic-FEELING and still escapist — max specificity of detail, calibrated liberties on tone. This is deliberately NOT a purist archaeological reconstruction (that shrinks the audience); it is Outlander's standard with Pompeii's best specific details turned up."

# --- RESOLVED by author 2026-06-21 ---
resolved_author_decisions:
  - "PROTAGONIST: Mara Reyes. Modern frame set in the LATE 1990s (sidesteps phone/GPS questions). Her FATHER (deceased) was the archaeologist whose passion she inherited — named EMILIO REYES (author-fixed 2026-07-11; on the page in Ch.1)."
  - "NAMING (2026-07-11): the Ch.1 permit contact, originally 'Reyes' (a collision with Mara Reyes), was RENAMED to Prof. HALLORAN. Father's given name set to EMILIO. See character-bible.md."
  - "LOVE INTEREST: Valens (former arena name 'Lupus'); scandal = framed over a PROVINCIAL LEGATE's wife (he was her sworn bodyguard, framed politically — Greece-plausible, deniable). Children: Lucius & Aelia."
  - "HOW SHE LEARNS THE WHEN: August Fenn (the vanished treasure hunter, alive & old, marooned in the past) has tracked the doors' rhythm; the Pompeii door's date is late summer 79 AD. Mara refuses the arithmetic until late (dramatic-irony clock)."
  - "TREASURE-HUNTER PAYOFF: Fenn went through young, could not return, lives marooned & old in the past — the cautionary mirror; he reveals the WHEN."
  - "ENDING: she STAYS. She lets the door close on the family's side and dies with them in the ash — an ACTIVE choice (hers, not the volcano's). The woman who kept returning to the past finally chooses the present she built."
  - "POV/TENSE: FIRST PERSON, PAST, RETROSPECTIVE (older Mara looking back; Outlander register, dread bleeds backward)."
  - "NO MODERN CODA: the book ENDS IN THE PAST (79 AD) with the eruption and her choice. Do NOT add a present-day excavation frame/ending."

