project:
  title: "Shadow God"
  genre: "Epic / Dark Fantasy"
  subgenre: "Mythic progression fantasy — street-thief-to-god"
  language: "English"
  word_count_target: 90000
  comp_titles: []
  engagement_type: {primary: "", secondary: "", tertiary: ""}
  premise: "Theran, an orphan street thief whose unnatural shadow-affinity marks him as a 'quirk' — the founder of a brand-new bloodline — is chosen as the new God of Shadows, a crack in the order the treacherous Artificer God built by murdering the old gods to appease invading Utarra."
  created: "2026-07-12"
  updated: "2026-07-12"

# ADAPTED RUN — revise/expand an existing draft, NOT genesis-from-idea.
adaptation:
  mode: "revise-existing-draft"
  canon_sources:
    # Fill these in once source material is staged into research/:
    original_draft:  "research/original-draft.md"   # author prose: Draft A + Draft B openings
    worldbuilding:   "research/worldbuilding-notes.md" # author canon: magic, bloodlines, gods, Utarra
    # series_roadmap:  "research/series-roadmap.md"
    # character_bible: "research/character-bible.md"
    # chapter_roadmap: "research/chapter-roadmap.md"   # scene-by-scene plan (binding outline)
    # master_checklist:"research/master-checklist.md"
  chapter_1_locked: false        # set true if Ch.1 is a hand-finished voice benchmark
  chapters_to_produce: []        # e.g. [2,3,...,N]

word_floor:
  manuscript_min_words: 85000    # HARD FLOOR (book total) — the binding gate; adjust per book.
  manuscript_target_words: 90000 # architect budgets Σ chapter targets ≥ this (see book-architect §0.5).
  # NOTE: there is deliberately NO uniform per-chapter floor. Chapter lengths VARY WIDELY
  # (~1,500–7,000w) by design — the book TOTAL is what's enforced, not each chapter. A
  # per-chapter minimum would recreate the uniform ~5k/20-chapter "AI-neat" shape.
  shortest_chapter_floor: 1200   # sanity floor for the SHORTEST allowed chapter (punch chapters ok; not a target)

phase:
  current: 1
  status: "seeded — author opening staged (research/original-draft.md); next: architect"
  history: []

chapters:
  total_planned: 0
  completed: []
  scores: {}

genesis_score:
  current_floor: 0.0
  current_average: 0.0

quality_gate:
  chapters_passed: []
  chapters_escalated: []

guardrails:
  - "PROTAGONIST NAME: main character is THERAN (renamed from Azolth 2026-07-12). Azolth is retired; rename any legacy usage."
  - "CANON (author, from worldbuilding-notes.md): inherent magic is RARE; artificers craft expensive magic items for the wealthy. Magic runs in BLOODLINES/family lines (artificers, were, elemental, adaptability, spirit, necromancer). Each line ties to a god; members access that line's whole domain but manifest a random signature/strength."
  - "CANON: Theran is a 'quirk' — an orphan founding a NEW SHADOW bloodline (assassin/thief skills)."
  - "CANON (central mythology): The God of Shadows was killed; Theran is chosen as the new God of Shadows. The ARTIFICER GOD betrayed the pantheon — cut a deal with the invading Utarran gods (chaos/corruption/destruction), killed the other gods, and sealed their Domains, cutting them off from the mortal connections they need."
  - "Author's own prose — PRESERVE VOICE. Revise/expand the drafts; do not overwrite intent. Two candidate openings (Draft A alley-pickpocket, Draft B Singing Siren artifact) — author to choose lead."
  - "Genesis Floor >= 8.5 per chapter (book-evaluator); polish-loop via book-editor (max 5)."
  - "Style gate: python3 tools/style_check.py must stay clean (simile <=4/1k, em-dash <=~10/1k, no NEW cross-chapter repeated phrase, tics under ceiling). Add this book's deliberate motifs to ALLOWLIST in tools/style_check.py."
  - "Word floor >= manuscript_min_words; verify with: wc -w manuscript/chapters/chapter-*.md."
  - "Revise/expand the original draft to the roadmap; do NOT invent from scratch. Match the locked Ch.1 voice if one exists."
  - "<add this book's settled canon guardrails here>"

open_author_decisions:
  - "<list any plot/character decisions the author must make before drafting>"

decisions:
  - "This book is a folder-per-book genesis project under book/genesis/shadow-god/."
revision_cycles: 0
