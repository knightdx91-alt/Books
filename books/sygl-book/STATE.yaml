project:
  title: "Sygl"
  genre: "Fantasy (harem-romance elements)"
  subgenre: "Progression / harem fantasy"
  language: "English"
  word_count_target: 90000
  comp_titles: ["Cradle (Will Wight)", "He Who Fights with Monsters (Shirtaloon)", "A Court of Thorns and Roses (Sarah J. Maas)"]
  engagement_type: {primary: "self_insertion (55%)", secondary: "empathy (35%)", tertiary: "fascination (10%)"}
  premise: "A sigil-less, one-handed orphan stumbles into the prison-temple of a forgotten goddess everyone calls a myth, regrows his hand on her blood and bonds her — the originator of the feared Blood sygl — as his own familiar; to keep the few people who finally choose him he must wield the one power that got her buried alive: stealing other gods' followers."
  created: "2026-07-13"
  updated: "2026-07-13"

# ADAPTED RUN — revise/expand an existing draft, NOT genesis-from-idea.
adaptation:
  mode: "revise-existing-draft"
  canon_sources:
    # Fill these in once source material is staged into research/:
    original_draft:  "Sygl_Complete.txt"   # raw prose to revise/expand
    # series_roadmap:  "research/series-roadmap.md"
    # character_bible: "research/character-bible.md"
    # chapter_roadmap: "research/chapter-roadmap.md"   # scene-by-scene plan (binding outline)
    # master_checklist:"research/master-checklist.md"
  chapter_1_locked: false        # set true if Ch.1 is a hand-finished voice benchmark
  chapters_to_produce: []        # e.g. [2,3,...,N]

word_floor:
  manuscript_min_words: 85000    # HARD FLOOR (book total) — the binding gate; adjust per book.
  manuscript_target_words: 90000 # architect budgets Σ chapter targets ≥ this (see book-architect §0.5).
  # NOTE: there is deliberately NO uniform per-chapter floor. Chapter lengths VARY WIDELY
  # (~1,500–7,000w) by design — the book TOTAL is what's enforced, not each chapter. A
  # per-chapter minimum would recreate the uniform ~5k/20-chapter "AI-neat" shape.
  shortest_chapter_floor: 1200   # sanity floor for the SHORTEST allowed chapter (punch chapters ok; not a target)

phase:
  current: 1
  status: "architect DONE — foundation.md + outline.md live in project/; source is Sygl_Complete.txt (root); 3 chapters drafted (manuscript/chapter-01..03.md), superseded/ holds earlier drafts. Resume: normalize STATE.yaml from project/ blueprint, repoint canon_sources at project/, optionally migrate manuscript/chapter-0N.md → manuscript/chapters/, then continue drafting. See feedback/progress.md."
  history: []

chapters:
  total_planned: 0
  completed: []
  scores: {}

genesis_score:
  current_floor: 0.0
  current_average: 0.0

quality_gate:
  chapters_passed: []
  chapters_escalated: []

guardrails:
  - "Genesis Floor >= 8.5 per chapter (book-evaluator); polish-loop via book-editor (max 5)."
  - "Style gate: python3 tools/style_check.py must stay clean (simile <=4/1k, em-dash <=~10/1k, no NEW cross-chapter repeated phrase, tics under ceiling). Add this book's deliberate motifs to ALLOWLIST in tools/style_check.py."
  - "Word floor >= manuscript_min_words; verify with: wc -w manuscript/chapters/chapter-*.md."
  - "Revise/expand the original draft to the roadmap; do NOT invent from scratch. Match the locked Ch.1 voice if one exists."
  - "REWRITE/EXPANSION of Sygl_Complete.txt (~49k → >=90k). Canon locked in project/foundation.md + STYLE_CONSTRAINTS.md (names, worldbuilding rules, war rules, conversion mechanic). Bal 'Norheart', Amelia (Vampire Goddess/familiar), Viridia, Lora; PAST tense; fade-to-black. Do NOT invent new plot or lose a canon beat. KEEP SEPARATE from black-jewels-like-book."

open_author_decisions:
  - "Migrate project/foundation.md + outline.md to book root (or keep in project/) so the pipeline finds the blueprint."
  - "Add the required friction: give Bal a real flaw/failure and the girls a genuine choice (harem assembles too easily in the source)."

decisions:
  - "This book is a folder-per-book genesis project under book/genesis/<slug>/."
revision_cycles: 0
